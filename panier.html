<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="style.css" rel="stylesheet">
  <title>Panier – HoneyZzz</title>
</head>
<body>

<nav>
  <div class="nav-left">
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="boutique.html" class="active">Boutique</a></li>
    </ul>
  </div>
  <div class="nav-center">
    <img src="logo_honeyzzz2.png" alt="Logo" class="logo-img">
  </div>
  <div class="nav-right">
    <a href="connexion.html" class="btn-connexion">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      Connexion
    </a>
    <button class="btn-panier" id="btn-panier" style="border-color:#c97a00;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Panier <span id="cart-count">0</span>
    </button>
  </div>
</nav>

<a href="boutique.html" class="retour-link">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
    <path d="M19 12H5M12 5l-7 7 7 7"/>
  </svg>
  Retour à la boutique
</a>

<div class="panier-section">
  <div>
    <h1 class="panier-titre">Mon Panier 🛒</h1>
    <div id="cart-container"></div>
  </div>
  <div class="recap-box">
    <div class="recap-titre">Récapitulatif</div>
    <div class="recap-line"><span>Sous-total</span><span id="sous-total">0,00 €</span></div>
    <div class="recap-line"><span>Livraison</span><span id="livraison">5,90 €</span></div>
    <div class="recap-line total"><span>Total</span><span id="total">0,00 €</span></div>
    <button class="btn-commander" id="btn-commander">Passer commande</button>
    <button class="btn-vider" id="btn-vider">Vider le panier</button>

  </div>
</div>

<footer>
  <div class="footer-content">
    <h5 class="footer-title">Nous suivre sur :</h5>
    <div class="social-links">
      <a href="https://www.instagram.com" target="_blank" class="social-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <path d="m16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
      </a>
      <a href="https://www.facebook.com" target="_blank" class="social-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
          <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
        </svg>
      </a>
      <a href="https://www.twitter.com" target="_blank" class="social-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
          <path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/>
        </svg>
      </a>
    </div>
    <p class="footer-copyright">&copy; 2024 HoneyZzz. Tous droits réservés.</p>
  </div>
</footer>


<script src="script.js"></script>
</body>
</html>
