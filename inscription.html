<!--Inscription-->
<section class="connexion" id="inscription">
  <div class="connexion-card">
    <h2>Créer un compte</h2>
    <p class="connexion-sub">Rejoignez la communauté HoneyZzz</p>
    <div class="form-group">
      <label>Je suis un :</label>
      <div class="role-choice">
        <label class="role-option">
          <input type="radio" name="role" value="client" checked>
          <span>🛒 Client</span>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="apiculteur">
          <span>🐝 Apiculteur</span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" placeholder="Jean" />
    </div>

    <div class="form-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" placeholder="Dupont" />
    </div>

    <div class="form-group">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="vous@exemple.com" />
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <div class="form-group">
      <label for="confirm-password">Confirmer le mot de passe</label>
      <input type="password" id="confirm-password" placeholder="••••••••" />
    </div>

    <div class="form-options">
      <label class="checkbox-wrap">
        <input type="checkbox" id="cgu"> J'accepte les <a href="#" class="forgot-link">conditions d'utilisation</a>
      </label>
    </div>

    <button class="btn-decouvrir" style="width:100%; text-align:center;" onclick="window.location.href='connexion.html'">Créer mon compte</button>

    <p class="register-link">Déjà un compte ? <a href="connexion.html">Se connecter</a></p>
  </div>
</section>

</body>
